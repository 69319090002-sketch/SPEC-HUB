<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SPEC HUB - Login</title>
    <link rel="stylesheet" href="theme-style.css">
    <style>
        body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:#f2f2f2;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        .box{background:#fff;padding:28px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.08);width:360px}
        .box a{color:#2563eb;text-decoration:none;font-weight:700}
        h2{margin-bottom:14px;color:#0f2a4c}
        label{display:block;margin:10px 0 6px;color:#444;font-size:0.95rem}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;color:#111;background:#fff}
        input::placeholder{color:#6b7280;opacity:1}
        button{margin-top:14px;width:100%;padding:10px;border-radius:8px;border:none;background:#0f172a;color:#fff;font-weight:700;cursor:pointer}
        .note{margin-top:14px;font-size:0.9rem;color:#666;text-align:center}
        .error{margin-top:10px;color:#b91c1c;font-size:0.95rem;text-align:center}
        body.dark-theme{background:#050816;color:#e2e8f0}
        body.dark-theme .box{background:rgba(15,23,42,0.96);box-shadow:0 20px 45px rgba(0,0,0,0.35)}
        body.dark-theme h2{color:#f8fafc}
        body.dark-theme label{color:#cbd5e1}
        body.dark-theme input{background:rgba(15,23,42,0.92);border:1px solid rgba(148,163,184,0.22);color:#e2e8f0}
        body.dark-theme input::placeholder{color:rgba(226,232,240,0.65)}
        body.dark-theme button{background:#2563eb}
        body.dark-theme .note{color:#94a3b8}
    </style>
</head>
<body>
    <script>
        (function(){
            const storedTheme = localStorage.getItem('spechub_theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : (prefersDark ? 'dark' : 'light');
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
    <div class="box">
        <h2>Login to SPEC HUB</h2>
        <form id="loginForm">
            <label for="username">Username</label>
            <input id="username" name="username" placeholder="ตัวอย่าง: admin" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="รหัสผ่าน" required>
            <button type="submit">Login</button>
        </form>
        <div class="error" id="loginError" style="display:none;"></div>
        <div class="note">ยังไม่มีบัญชี? <a href="Signup.html">สมัครสมาชิก</a> ก่อนใช้งาน</div>
    </div>
    <script>
        function showError(message) {
            const errorEl = document.getElementById('loginError');
            if (!errorEl) return;
            errorEl.textContent = message;
            errorEl.style.display = message ? 'block' : 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e){
            e.preventDefault();
            showError('');
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await response.json();
                if (!response.ok) {
                    showError(data.message || 'เกิดข้อผิดพลาดในการเข้าสู่ระบบ');
                    return;
                }
                localStorage.setItem('spechub_user', data.username);
                window.location = 'HOME.html';
            } catch (error) {
                showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ โปรดตรวจสอบว่า backend ทำงานอยู่');
            }
        });
    </script>
</body>
</html>
