<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPEC HUB - COMPARE</title>
    <link rel="stylesheet" href="theme-style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #d8d8d8;
            color: #111;
        }
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px;
            background: linear-gradient(180deg, #e5e5e5 0%, #c8c8c8 100%);
        }
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            margin-bottom: 20px;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #2563eb 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        nav {
            display: flex;
            gap: 24px;
        }
        nav a {
            text-decoration: none;
            color: #222;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        nav a:hover {
            color: #0f2a4c;
        }
        nav a.active {
            background: linear-gradient(90deg, #2563eb 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .header-actions a {
            color: #fff;
            background: linear-gradient(90deg, #2563eb 0%, #1e40af 100%);
            padding: 10px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }
        .hero {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(245,245,245,0.98));
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.14);
            padding: 30px;
            margin-bottom: 24px;
        }
        .compare-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .compare-title h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #2563eb 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .compare-title p {
            color: #666;
            font-size: 1rem;
        }
        .compare-tools {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 220px;
        }
        .tool-group-center {
            margin: 0 auto;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .compare-search-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            margin-bottom: 24px;
            width: 100%;
        }
        .compare-grid {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: transparent;
            border: none;
            border-radius: 18px;
            padding: 0;
            position: relative;
        }
        .search-panel label {
            display: block;
            text-align: center;
            color: #334155;
            font-size: 0.95rem;
            font-weight: 700;
        }
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 999px;
            padding: 12px 16px;
            border: 1px solid rgba(15,23,42,0.08);
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 1rem;
            color: #0f172a;
            padding: 0;
            min-width: 0;
            text-align: center;
        }
        .search-box input::placeholder {
            color: rgba(15,23,42,0.45);
        }
        .suggestions-box {
            display: none;
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 1px solid rgba(15,23,42,0.08);
            border-radius: 16px;
            box-shadow: 0 16px 30px rgba(15,23,42,0.08);
            z-index: 20;
            overflow: hidden;
            max-height: 320px;
            overflow-y: auto;
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #0f172a;
            border-bottom: 1px solid rgba(15,23,42,0.08);
            background: transparent;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background: rgba(148,163,184,0.12);
        }
        .suggestion-item .item-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .suggestion-item .item-text::before {
            content: '🔍';
            font-size: 0.95rem;
            opacity: 0.8;
        }
        .suggestion-item .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .compare-tools select,
        .compare-tools input {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fff;
            color: #111;
            cursor: pointer;
        }
        .compare-tools input::placeholder {
            color: #64748b;
            opacity: 1;
        }
        .compare-tools input {
            width: 100%;
        }
        body.dark-theme .search-panel label {
            color: #e2e8f0;
        }
        body.dark-theme .search-panel input {
            background: rgba(15,23,42,0.92);
            border-color: rgba(148,163,184,0.24);
            color: #e2e8f0;
        }
        body.dark-theme .search-panel input::placeholder {
            color: rgba(226,232,240,0.68);
        }
        body.dark-theme .search-box {
            background: rgba(15,23,42,0.95);

        }
        body.dark-theme .search-box input {

        }
        body.dark-theme .search-box input::placeholder {

        body.dark-theme .suggestions-box {

        body.dark-theme .suggestion-item {

        }
        body.dark-theme .suggestion-item:hover {

        }
        .compare-tools input {
            width: 100%;
        }
        .side-title,

            font-size: 0.95rem;
            font-weight: 700;
            color: #0f2a4c;

        .compare-tools select,

        .compare-cards {

            gap: 22px;
            margin-bottom: 22px;

        .compare-card {
            background: rgba(255,255,255,0.92);
            border-radius: 22px;
            box-shadow: 0 18px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;

        .compare-card .card-image {
            background: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            min-height: 220px;
        }
        .compare-card .card-image img {
            width: auto;
            max-width: 220px;
            max-height: 220px;
            height: auto;
            object-fit: contain;
        }
        .compare-card .card-body {
            padding: 20px 22px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .compare-card .product-name {
            font-weight: 700;
            color: #111;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .compare-card .spec-table {
            width: 100%;
            border-collapse: collapse;
        }
        .compare-card .spec-table td {
            padding: 10px 0;
            color: #4a4a4a;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            font-size: 0.92rem;

        .compare-card .spec-table td:first-child {

        .compare-card .spec-table td:last-child {

        }
        .compare-card .spec-table tr:last-child td {
            border-bottom: none;
        }
        .compare-card .placeholder-text {
            color: #475569;
            font-size: 0.95rem;
            text-align: center;
        }

    <script>
        (function(){
            function getCurrentPage(){
                return window.location.pathname.split('/').pop() || 'HOME.html';
            }
            function updateAuth(){
                const auth = document.getElementById('auth-action');
                const user = localStorage.getItem('spechub_user');
                if(!auth) return;
                if(user){
                    auth.textContent = user;
                    auth.href = '#';
                    auth.onclick = function(e){ 
                        e.preventDefault(); 
                        if(confirm('ต้องการออกจากระบบใช่หรือไม่?')){
                            localStorage.removeItem('spechub_user'); 
                            window.location = getCurrentPage();
                        }
                    };
                } else {
                    auth.textContent = 'Login';
                    auth.href = 'login.html';
                    auth.onclick = null;
                }
            }
            updateAuth();
        })();
    </script>

    <script>
        (function() {
            const categorySelect = document.getElementById('categorySelect');
            const leftInput = document.getElementById('leftProductInput');
            const rightInput = document.getElementById('rightProductInput');
            const leftSuggestions = document.getElementById('leftSuggestions');
            const rightSuggestions = document.getElementById('rightSuggestions');
            const leftCardImage = document.getElementById('leftCardImage');
            const leftCardName = document.getElementById('leftCardName');
            const leftSpecTable = document.getElementById('leftSpecTable');
            const rightCardImage = document.getElementById('rightCardImage');
            const rightCardName = document.getElementById('rightCardName');
            const rightSpecTable = document.getElementById('rightSpecTable');

            const categories = {
                cpu: {
                    label: 'CPU',
                    data: () => cpuDatabase,
                    specs: [
                        { label: 'Series', key: 'series' },
                        { label: 'Socket', key: 'socket' },
                        { label: 'Cores / Threads', key: 'coresThreads' },
                        { label: 'Graphics', key: 'graphics' },
                        { label: 'TDP', key: 'tdp' },
                        { label: 'Cooler', key: 'cooler' }
                    ]
                },
                gpu: {
                    label: 'GPU',
                    data: () => gpuDatabase,
                    specs: [
                        { label: 'Brand', key: 'brand' },
                        { label: 'Model', key: 'model' },
                        { label: 'Memory', key: 'memorySize' },
                        { label: 'Max Resolution', key: 'maxResolution' },
                        { label: 'Power Requirement', key: 'powerRequirement' },
                        { label: 'Warranty', key: 'warranty' }
                    ]
                },
                case: {
                    label: 'CASE',
                    data: () => caseDatabase,
                    specs: [
                        { label: 'Type', key: 'type' },
                        { label: 'Motherboard Support', key: 'motherboard' },
                        { label: 'Max GPU Length', key: 'maxGpuLength' },
                        { label: 'Max CPU Cooler Height', key: 'maxCpuCooler' },
                        { label: 'Fan Support', key: 'fanSupport' },
                        { label: 'Color', key: 'color' }
                    ]
                },
                mobo: {
                    label: 'MAIN BORD',
                    data: () => mainboardDatabase,
                    specs: [
                        { label: 'Socket', key: 'socket' },
                        { label: 'Form Factor', key: 'formFactor' },
                        { label: 'Chipset', key: 'chipset' },
                        { label: 'Memory Slots', key: 'memorySlots' },
                        { label: 'M.2 Slots', key: 'm2Slots' },
                        { label: 'USB Ports', key: 'usbPorts' }
                    ]
                }
            };

            function getCurrentDatabase() {
                const category = categorySelect.value;
                return categories[category] ? categories[category].data() : [];
            }

            function getSelectedProduct(inputValue, items) {
                if (!inputValue) return null;
                return items.find(item => item.name.toLowerCase() === inputValue.toLowerCase()) || null;
            }

            function buildSpecRows(product, specList) {
                if (!product) {
                    return '';
                }
                return specList.map(spec => {
                    const value = product[spec.key] || '-';
                    return `
                        <tr>
                            <td>${spec.label}</td>
                            <td>${value}</td>
                        </tr>
                    `;
                }).join('');
            }

            function renderCard(product, cardImageEl, cardNameEl, specTableEl, defaultTitle) {
                if (!product) {
                    cardImageEl.innerHTML = '';
                    cardNameEl.textContent = '';
                    specTableEl.innerHTML = '';
                    return;
                }

                cardImageEl.innerHTML = `<img src="${product.image}" alt="${product.name}">`;
                cardNameEl.textContent = product.name;
                const category = categorySelect.value;
                const specList = categories[category].specs;
                specTableEl.innerHTML = buildSpecRows(product, specList);
            }

            function renderComparison() {
                const items = getCurrentDatabase();
                const left = getSelectedProduct(leftInput.value.trim(), items);
                const right = getSelectedProduct(rightInput.value.trim(), items);

                renderCard(left, leftCardImage, leftCardName, leftSpecTable, 'ฝั่งซ้าย');
                renderCard(right, rightCardImage, rightCardName, rightSpecTable, 'ฝั่งขวา');
            }

            function populateProductLists() {
                leftInput.value = '';
                rightInput.value = '';
            }
            function createSuggestionItem(item, inputEl) {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `
                    <span class="item-text">${item.name}</span>
                    <span class="badge">${categories[categorySelect.value].label}</span>
                `;
                div.addEventListener('click', () => {
                    inputEl.value = item.name;
                    renderComparison();
                    hideSuggestions(inputEl === leftInput ? leftSuggestions : rightSuggestions);
                });
                return div;
            }
            function showSuggestions(inputEl, listEl) {
                const keyword = inputEl.value.trim().toLowerCase();
                const items = getCurrentDatabase();
                const matches = items.filter(item => item.name.toLowerCase().includes(keyword)).slice(0, 6);
                if (!keyword || matches.length === 0) {
                    hideSuggestions(listEl);
                    return;
                }
                listEl.innerHTML = '';
                matches.forEach(item => listEl.appendChild(createSuggestionItem(item, inputEl)));
                listEl.style.display = 'block';
            }
            function hideSuggestions(listEl) {
                listEl.style.display = 'none';
            }

            function handleCategoryChange() {
                populateProductLists();
                renderComparison();
            }

            categorySelect.addEventListener('change', handleCategoryChange);
            leftInput.addEventListener('input', (e) => {
                renderComparison();
                showSuggestions(leftInput, leftSuggestions);
            });
            rightInput.addEventListener('input', (e) => {
                renderComparison();
                showSuggestions(rightInput, rightSuggestions);
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    hideSuggestions(leftSuggestions);
                    hideSuggestions(rightSuggestions);
                }
            });

            populateProductLists();
            renderComparison();
        })();
    </script>
    <script src="theme-toggle.js"></script>
</body>
</html>
